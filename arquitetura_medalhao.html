  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

03, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"bb6d705a-2a7d-4513-9493-fff9cd006b9b\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"c9cef7cf-270e-47a2-8dde-7a4d68bdaa7a\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"6eebc53a-4601-4803-b5a4-a8107fde6467\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"bb6d705a-2a7d-4513-9493-fff9cd006b9b\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"c9cef7cf-270e-47a2-8dde-7a4d68bdaa7a\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\/style>\n<script src=\"4706a009-b722-4518-abcd-9c3f7583e7fd\"><\/script>\n\n<script type=\"application/json\" id=\"speaker-notes\">\n[\n  \"Bem-vindos. Hoje vamos falar sobre como a Brivia organiza seus dados — da chegada até o consumo. O nome técnico é arquitetura medalhão, mas a ideia é simples: camadas com responsabilidades bem definidas.\",\n  \"Antes de entrar na nossa stack, é importante entender o que a arquitetura medalhão é — e o que ela não é. Ela é uma convenção de organização. Não é uma tecnologia, não é um framework, não é um produto. É uma forma de pensar onde cada dado deve estar em cada momento.\",\n  \"Esse diagrama é o mapa da nossa stack. Cloud Storage recebe tudo bruto. O BigQuery transforma e organiza em Silver e Gold. E o consumo acontece via Power BI, Looker, Planilhas e exportações. Cada slide daqui pra frente aprofunda um pedaço desse mapa.\",\n  \"O Bronze é o ponto de entrada. Tudo que chega, chega aqui. Sem filtro, sem transformação, sem julgamento. A filosofia é simples: guardar tudo, não sobrescrever nada. Storage é barato, e dado perdido não volta.\",\n  \"A organização do Bronze não é acidental. Cada nível da pasta tem um propósito, e isso se traduz em performance no BigQuery: filtros mais rápidos, menos bytes lidos, menos custo. Para iniciantes — particionamento é basicamente dizer ao banco de dados onde procurar antes de procurar.\",\n  \"Silver é o primeiro nível de confiança. Aqui o dado já passou por deduplicação, padronização e validação. A regra prática: se você vai tomar uma decisão de negócio, não use dado de Bronze diretamente. Use Silver.\",\n  \"Gold é onde as perguntas de negócio têm resposta. Os modelos aqui são construídos para consumo — não para guardar histórico. Power BI, Looker, Planilhas e exportações consomem exclusivamente daqui.\",\n  \"O DBT é a cola que conecta as camadas. Ele não move dado — quem executa é o BigQuery. O DBT organiza as transformações como código, versionado no Git, com rastreabilidade completa de onde cada dado veio.\",\n  \"O diagrama de linhagem é a melhor forma de entender o que o DBT faz na prática. Cada nó é um modelo SQL. As setas mostram dependência — se um modelo mudar, você sabe exatamente o que é afetado downstream.\",\n  \"Para fechar: Bronze é o lago, Silver é o dado confiável, Gold é o dado pronto. Cada camada tem um lugar, um formato e um dono. Essa clareza é o que permite a Brivia escalar sem perder rastreabilidade.\"\n]\n<\/script>\n\n<style>\n  :root {\n    --bg: #f0f1ec;\n    --accent: #1d4ed8;\n    --title: #2c3a57;\n    --text: #52525b;\n    --white: #ffffff;\n    --bronze: #a0692a;\n    --silver: #4a6070;\n    --gold-c: #8a6a00;\n  }\n\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n  body { font-family: 'Space Grotesk', sans-serif; background: #111; }\n\n  section {\n    width: 100%; height: 100%;\n    font-family: 'Space Grotesk', sans-serif;\n    background: var(--bg);\n    overflow: hidden;\n  }\n\n  /* ── SHARED LAYOUT ── */\n  .slide {\n    width: 100%; height: 100%;\n    position: relative;\n    padding: 80px 120px 72px;\n    display: flex;\n    flex-direction: column;\n  }\n\n  .logo {\n    position: absolute;\n    top: 36px; right: 56px;\n    width: 96px;\n    opacity: 0.7;\n  }\n\n  .slide-eyebrow {\n    font-size: 24px;\n    font-weight: 600;\n    letter-spacing: 0.1em;\n    text-transform: uppercase;\n    color: var(--accent);\n    margin-bottom: 20px;\n  }\n\n  .slide-title {\n    font-size: 56px;\n    font-weight: 700;\n    color: var(--title);\n    line-height: 1.1;\n    margin-bottom: 52px;\n  }\n\n  /* ── SLIDE 1 ── */\n  .s1-title {\n    font-size: 104px;\n    font-weight: 700;\n    color: var(--title);\n    line-height: 1.0;\n    margin-bottom: 36px;\n  }\n  .s1-sub {\n    font-size: 40px;\n    font-weight: 300;\n    color: var(--text);\n  }\n  .s1-rule {\n    width: 64px; height: 4px;\n    background: var(--accent);\n    margin-bottom: 40px;\n  }\n\n  /* ── LAYERS (slide 2) ── */\n  .layers { display: flex; gap: 40px; flex: 1; align-items: stretch; }\n  .layer-card {\n    flex: 1;\n    background: var(--white);\n    border-radius: 10px;\n    padding: 48px 44px;\n    display: flex; flex-direction: column; gap: 16px;\n    box-shadow: 0 2px 12px rgba(44,58,87,0.07);\n    border-top: 6px solid transparent;\n  }\n  .lc-bronze { border-top-color: #cd7f32; }\n  .lc-silver { border-top-color: #8e9eab; }\n  .lc-gold   { border-top-color: #d4af37; }\n  .layer-label {\n    font-size: 24px; font-weight: 600;\n    letter-spacing: 0.1em; text-transform: uppercase;\n  }\n  .ll-bronze { color: var(--bronze); }\n  .ll-silver { color: var(--silver); }\n  .ll-gold   { color: var(--gold-c); }\n  .layer-card h3 { font-size: 44px; font-weight: 700; color: var(--title); line-height: 1.1; }\n  .layer-card p  { font-size: 30px; font-weight: 400; color: var(--text); line-height: 1.5; }\n  .convention-note {\n    margin-top: 40px;\n    font-size: 28px; font-style: italic;\n    color: var(--text);\n    padding-left: 24px;\n    border-left: 4px solid var(--accent);\n  }\n\n  /* ── STACK DIAGRAM (slide 3) ── */\n  .stack-diagram {\n    flex: 1;\n    display: flex; align-items: center; justify-content: center;\n    padding-top: 16px;\n  }\n  /* Airflow outer wrapper */\n  .airflow-wrap {\n    position: relative;\n    border: 2px dashed rgba(44,58,87,0.22);\n    border-radius: 16px;\n    padding: 48px 56px 40px;\n    display: flex; align-items: center; gap: 0;\n  }\n  .airflow-badge {\n    position: absolute;\n    top: -18px; left: 32px;\n    background: var(--bg);\n    padding: 4px 20px;\n    font-size: 24px; font-weight: 700;\n    letter-spacing: 0.08em; text-transform: uppercase;\n    color: var(--title);\n    border: 2px solid rgba(44,58,87,0.22);\n    border-radius: 6px;\n  }\n  .airflow-badge span {\n    font-size: 24px; font-weight: 400;\n    color: var(--text); letter-spacing: 0.02em; text-transform: none; margin-left: 8px;\n  }\n  /* DBT wrapper around BQ */\n  .dbt-wrap {\n    position: relative;\n    border: 2px dashed rgba(29,78,216,0.35);\n    border-radius: 12px;\n    padding: 40px 40px 28px;\n    display: flex; flex-direction: column; align-items: center; gap: 12px;\n    margin: 0 8px;\n  }\n  .dbt-badge {\n    position: absolute;\n    top: -16px; left: 24px;\n    background: var(--bg);\n    padding: 3px 16px;\n    font-size: 24px; font-weight: 700;\n    letter-spacing: 0.08em; text-transform: uppercase;\n    color: var(--accent);\n    border: 2px solid rgba(29,78,216,0.35);\n    border-radius: 6px;\n  }\n  .stack-node { display: flex; flex-direction: column; align-items: center; gap: 14px; }\n  .stack-box {\n    border-radius: 10px; padding: 24px 40px;\n    text-align: center; min-width: 220px;\n  }\n  .sb-storage { background: var(--white); box-shadow: 0 2px 12px rgba(44,58,87,0.08); }\n  .sb-storage .node-label { font-size: 24px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text); margin-bottom: 6px; }\n  .sb-storage .node-name  { font-size: 32px; font-weight: 700; color: var(--title); }\n  .sb-bq { background: var(--accent); }\n  .sb-bq .node-label { font-size: 24px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.7); margin-bottom: 6px; }\n  .sb-bq .node-name  { font-size: 32px; font-weight: 700; color: var(--white); }\n  .sb-consume { background: var(--white); box-shadow: 0 2px 12px rgba(44,58,87,0.08); }\n  .sb-consume .node-label { font-size: 24px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text); margin-bottom: 6px; }\n  .sb-consume .node-name  { font-size: 26px; font-weight: 700; color: var(--title); line-height: 1.8; }\n  .bq-layers { display: flex; flex-direction: column; gap: 8px; margin-top: 6px; width: 100%; }\n  .bq-layer { border-radius: 6px; padding: 8px 28px; font-size: 25px; font-weight: 600; text-align: center; }\n  .bq-silver { background: rgba(74,96,112,0.12); color: var(--silver); }\n  .bq-gold   { background: rgba(138,106,0,0.1);  color: var(--gold-c); }\n  .stack-sub { font-size: 24px; font-weight: 500; color: var(--text); opacity: 0.6; }\n  .stack-arrow { font-size: 44px; color: rgba(44,58,87,0.25); margin: 0 16px 48px; flex-shrink: 0; }\n\n  /* ── BRONZE BULLETS (slide 4) ── */\n  .section-badge {\n    display: inline-block; font-size: 24px; font-weight: 600;\n    letter-spacing: 0.1em; text-transform: uppercase;\n    padding: 6px 20px; border-radius: 4px; margin-bottom: 20px;\n  }\n  .badge-bronze { background: rgba(160,105,42,0.1);  color: var(--bronze); }\n  .badge-silver { background: rgba(74,96,112,0.1);   color: var(--silver); }\n  .badge-gold   { background: rgba(138,106,0,0.1);   color: var(--gold-c); }\n  .badge-dbt    { background: rgba(29,78,216,0.08);  color: var(--accent); }\n\n  .bullets { display: flex; flex-direction: column; gap: 26px; }\n  .bullet-item {\n    display: flex; align-items: flex-start; gap: 20px;\n    font-size: 34px; font-weight: 400; color: var(--text); line-height: 1.4;\n  }\n  .bullet-dot {\n    width: 9px; height: 9px; border-radius: 50%;\n    background: var(--accent); flex-shrink: 0; margin-top: 14px;\n  }\n\n  /* ── BRONZE STRUCTURE (slide 5) ── */\n  .path-block {\n    background: var(--title);\n    border-radius: 10px; padding: 36px 48px;\n    margin: 32px 0;\n    font-size: 28px; font-weight: 500;\n    color: #a8c4e8; line-height: 1.8;\n  }\n  .path-highlight { color: #7dd3fc; font-weight: 700; }\n  .path-val { color: #86efac; }\n  .struct-points { display: flex; gap: 40px; }\n  .struct-point {\n    flex: 1; background: var(--white);\n    border-radius: 10px; padding: 32px 36px;\n    box-shadow: 0 2px 12px rgba(44,58,87,0.07);\n  }\n  .struct-point h4 { font-size: 28px; font-weight: 700; color: var(--title); margin-bottom: 12px; }\n  .struct-point p  { font-size: 28px; font-weight: 400; color: var(--text); line-height: 1.5; }\n\n  /* ── SILVER (slide 6) ── */\n  .silver-bullets { display: flex; flex-direction: column; gap: 32px; margin-top: 24px; }\n  .silver-bullet  { display: flex; align-items: center; gap: 28px; }\n  .silver-num {\n    width: 52px; height: 52px; border-radius: 50%;\n    background: var(--accent);\n    display: flex; align-items: center; justify-content: center;\n    font-size: 26px; font-weight: 700; color: var(--white); flex-shrink: 0;\n  }\n  .silver-text { font-size: 36px; font-weight: 400; color: var(--text); line-height: 1.35; }\n  .silver-text strong { font-weight: 700; color: var(--title); }\n  .trust-callout {\n    margin-top: 56px; padding: 32px 44px;\n    border-radius: 10px;\n    background: var(--white);\n    font-size: 32px; font-weight: 500;\n    color: var(--title); font-style: italic;\n    border-left: 5px solid var(--accent);\n    box-shadow: 0 2px 12px rgba(44,58,87,0.07);\n  }\n\n  /* ── GOLD (slide 7) ── */\n  .gold-grid {\n    display: grid; grid-template-columns: 1fr 1fr;\n    gap: 28px; margin-top: 32px; flex: 1;\n  }\n  .gold-card {\n    background: var(--white); border-radius: 10px;\n    padding: 36px 40px; border-top: 5px solid #d4af37;\n    box-shadow: 0 2px 12px rgba(44,58,87,0.07);\n  }\n  .gold-card h4 {\n    font-size: 26px; font-weight: 600; letter-spacing: 0.06em;\n    text-transform: uppercase; color: var(--gold-c); margin-bottom: 14px;\n  }\n  .gold-card p { font-size: 30px; font-weight: 400; color: var(--text); line-height: 1.45; }\n  .gold-card.wide { grid-column: span 2; border-top-color: var(--accent); }\n  .gold-card.wide h4 { color: var(--accent); }\n\n  /* ── DBT (slide 8) ── */\n  .dbt-intro {\n    font-size: 34px; font-weight: 400; color: var(--text);\n    line-height: 1.6; max-width: 1300px; margin-bottom: 56px; margin-top: 4px;\n  }\n  .dbt-items { display: flex; gap: 36px; }\n  .dbt-item {\n    flex: 1; background: var(--white); border-radius: 10px;\n    padding: 40px 36px; border-top: 4px solid var(--accent);\n    box-shadow: 0 2px 12px rgba(44,58,87,0.07);\n  }\n  .dbt-item h4 { font-size: 30px; font-weight: 700; color: var(--title); margin-bottom: 14px; line-height: 1.2; }\n  .dbt-item p  { font-size: 27px; font-weight: 400; color: var(--text); line-height: 1.5; }\n\n  /* ── LINEAGE (slide 9) ── */\n  .lineage-wrap {\n    flex: 1;\n    position: relative;\n    margin-top: 32px;\n  }\n  .lineage-inner {\n    position: relative;\n    width: 1620px;\n    height: 440px;\n    margin: 0 auto;\n  }\n  .lin-col-label {\n    position: absolute;\n    top: 0;\n    font-size: 24px; font-weight: 600;\n    letter-spacing: 0.09em; text-transform: uppercase;\n  }\n  .lcl-bronze { color: var(--bronze); left: 10px; }\n  .lcl-silver { color: var(--silver); left: 430px; }\n  .lcl-gold   { color: var(--gold-c); left: 860px; }\n  .lcl-consume{ color: var(--accent); left: 1300px; }\n\n  .lin-node {\n    position: absolute;\n    border-radius: 8px;\n    padding: 14px 28px;\n    font-size: 26px; font-weight: 600;\n    white-space: nowrap;\n    box-shadow: 0 2px 10px rgba(44,58,87,0.09);\n  }\n  .ln-bronze { background: rgba(160,105,42,0.08); color: #7a4a10; border: 2px solid rgba(160,105,42,0.28); }\n  .ln-silver { background: rgba(74,96,112,0.08);  color: #2a4050; border: 2px solid rgba(74,96,112,0.28); }\n  .ln-gold   { background: rgba(138,106,0,0.08);  color: #5a4000; border: 2px solid rgba(138,106,0,0.28); }\n  .ln-consume{ background: rgba(29,78,216,0.07);  color: var(--accent); border: 2px solid rgba(29,78,216,0.22); }\n\n  .lin-svg {\n    position: absolute;\n    top: 0; left: 0;\n    width: 100%; height: 100%;\n    pointer-events: none;\n    overflow: visible;\n  }\n\n  /* ── RECAP (slide 10) ── */\n  .recap-table {\n    width: 100%; border-collapse: separate; border-spacing: 0;\n    margin-top: 44px; border-radius: 12px; overflow: hidden;\n    box-shadow: 0 2px 24px rgba(44,58,87,0.09);\n  }\n  .recap-table th {\n    padding: 28px 36px; font-size: 30px; font-weight: 700;\n    text-align: left; color: var(--white);\n  }\n  .th-label  { background: var(--title); }\n  .th-bronze { background: var(--bronze); }\n  .th-silver { background: var(--silver); }\n  .th-gold   { background: var(--gold-c); }\n  .recap-table td {\n    padding: 24px 36px; font-size: 28px; font-weight: 400;\n    color: var(--text); border-bottom: 1px solid #e2e4de;\n    background: var(--white); line-height: 1.4;\n  }\n  .recap-table tr:last-child td { border-bottom: none; }\n  .recap-table .row-header {\n    font-size: 24px; font-weight: 700; color: var(--title);\n    background: rgba(240,241,236,0.7);\n    text-transform: uppercase; letter-spacing: 0.06em;\n    padding: 18px 36px;\n  }\n<\/style>\n\n<\/head>\n<body>\n<deck-stage width=\"1920\" height=\"1080\">\n\n  <!-- ─── SLIDE 1: TÍTULO ─── -->\n  <section data-label=\"01 Título\">\n    <div class=\"slide\" style=\"justify-content:center;\">\n      <img src=\"b4556244-2720-4c48-9bee-edc0bd1198da\" class=\"logo\">\n      <div class=\"slide-eyebrow\">Data Training Program · Engenharia de Dados<\/div>\n      <div class=\"s1-rule\"><\/div>\n      <div class=\"s1-title\">Arquitetura<br>Medalhão<\/div>\n      <div class=\"s1-sub\">do dado bruto ao consumo<\/div>\n    <\/div>\n  <\/section>\n\n  <!-- ─── SLIDE 2: O QUE É ─── -->\n  <section data-label=\"02 O que é a arquitetura medalhão\">\n    <div class=\"slide\" style=\"justify-content:space-between;\">\n      <img src=\"b4556244-2720-4c48-9bee-edc0bd1198da\" class=\"logo\">\n      <div>\n        <div class=\"slide-title\" style=\"margin-bottom:40px;\">O que é a arquitetura medalhão<\/div>\n        <div class=\"layers\" style=\"gap:48px;\">\n          <div class=\"layer-card lc-bronze\">\n            <span class=\"layer-label ll-bronze\">Bronze<\/span>\n            <h3>Dado bruto<\/h3>\n            <p>Tudo que chega, sem nenhum toque. Preservação total.<\/p>\n          <\/div>\n          <div class=\"layer-card lc-silver\">\n            <span class=\"layer-label ll-silver\">Silver<\/span>\n            <h3>Dado confiável<\/h3>\n            <p>Limpo, deduplicado, padronizado. Aqui você pode confiar.<\/p>\n          <\/div>\n          <div class=\"layer-card lc-gold\">\n            <span class=\"layer-label ll-gold\">Gold<\/span>\n            <h3>Pronto para consumo<\/h3>\n            <p>Modelado para responder perguntas de negócio.<\/p>\n          <\/div>\n        <\/div>\n      <\/div>\n      <div class=\"convention-note\" style=\"margin-top:0;\">\n        Isso é uma <strong>convenção de organização<\/strong>, não uma tecnologia.\n      <\/div>\n    <\/div>\n  <\/section>\n\n  <!-- ─── SLIDE 3: STACK OVERVIEW ─── -->\n  <section data-label=\"03 Nossa stack de dados\">\n    <div class=\"slide\" style=\"justify-content:center; gap:40px;\">\n      <img src=\"b4556244-2720-4c48-9bee-edc0bd1198da\" class=\"logo\">\n      <div class=\"slide-title\">Nossa stack de dados<\/div>\n      <div class=\"stack-diagram\" style=\"flex:0;\">\n        <!-- Airflow wraps everything -->\n        <div class=\"airflow-wrap\">\n          <div class=\"airflow-badge\">Airflow <span>orquestrador<\/span><\/div>\n\n          <!-- Cloud Storage -->\n          <div class=\"stack-node\">\n            <div class=\"stack-box sb-storage\">\n              <div class=\"node-label\">Dados brutos<\/div>\n              <div class=\"node-name\">Cloud Storage<\/div>\n            <\/div>\n            <div class=\"stack-sub\">Bronze · Data Lake<\/div>\n          <\/div>\n\n          <div class=\"stack-arrow\">→<\/div>\n\n          <!-- DBT wraps BigQuery -->\n          <div class=\"dbt-wrap\">\n            <div class=\"dbt-badge\">DBT<\/div>\n            <div class=\"stack-node\">\n              <div class=\"stack-box sb-bq\">\n                <div class=\"node-label\">Transformação<\/div>\n                <div class=\"node-name\">BigQuery<\/div>\n              <\/div>\n              <div class=\"bq-layers\">\n                <div class=\"bq-layer bq-silver\">Silver — dado confiável<\/div>\n                <div class=\"bq-layer bq-gold\">Gold — pronto para consumo<\/div>\n              <\/div>\n            <\/div>\n          <\/div>\n\n          <div class=\"stack-arrow\">→<\/div>\n\n          <!-- Consumo -->\n          <div class=\"stack-node\">\n            <div class=\"stack-box sb-consume\">\n              <div class=\"node-label\">Consumo<\/div>\n              <div class=\"node-name\">Power BI<br>Looker<br>Planilhas<br>Exportações<\/div>\n            <\/div>\n          <\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/section>\n\n  <!-- ─── SLIDE 4: BRONZE WHERE ─── -->\n  <section data-label=\"04 Bronze — onde tudo chega\">\n    <div class=\"slide\" style=\"justify-content:center; gap:40px;\">\n      <img src=\"b4556244-2720-4c48-9bee-edc0bd1198da\" class=\"logo\">\n      <div>\n        <span class=\"section-badge badge-bronze\">Bronze<\/span>\n        <div class=\"slide-title\" style=\"margin-bottom:40px;margin-top:12px;\">Onde tudo chega<\/div>\n      <\/div>\n      <div class=\"bullets\" style=\"gap:36px;\">\n        <div class=\"bullet-item\"><div class=\"bullet-dot\"><\/div><span>Cloud Storage como Data Lake<\/span><\/div>\n        <div class=\"bullet-item\"><div class=\"bullet-dot\"><\/div><span>Parquet na maioria — CSV e JSON quando o dado chega assim<\/span><\/div>\n        <div class=\"bullet-item\"><div class=\"bullet-dot\"><\/div><span>Dado bruto, <strong>sem nenhum toque<\/strong><\/span><\/div>\n        <div class=\"bullet-item\"><div class=\"bullet-dot\"><\/div><span>Tudo guardado, nada sobrescrito<\/span><\/div>\n        <div class=\"bullet-item\"><div class=\"bullet-dot\"><\/div><span>Storage é barato e cresce sem limite — faz sentido guardar tudo<\/span><\/div>\n        <div class=\"bullet-item\"><div class=\"bullet-dot\"><\/div><span>Conectado ao BigQuery como External Table<\/span><\/div>\n      <\/div>\n    <\/div>\n  <\/section>\n\n  <!-- ─── SLIDE 5: BRONZE STRUCTURE ─── -->\n  <section data-label=\"05 Bronze — organização e particionamento\">\n    <div class=\"slide\" style=\"justify-content:center; gap:40px;\">\n      <img src=\"b4556244-2720-4c48-9bee-edc0bd1198da\" class=\"logo\">\n      <div>\n        <span class=\"section-badge badge-bronze\">Bronze<\/span>\n        <div class=\"slide-title\" style=\"margin-bottom:32px;margin-top:12px;\">Organização e particionamento<\/div>\n      <\/div>\n      <div>\n        <div class=\"path-block\">\n          <span class=\"path-highlight\">brv-<\/span><span class=\"path-val\">&lt;projeto&gt;<\/span><span class=\"path-highlight\">-bronze/<\/span><span class=\"path-val\">&lt;ambiente&gt;<\/span>/<span class=\"path-val\">&lt;dominio&gt;<\/span>/<span class=\"path-val\">&lt;tabela&gt;<\/span>/<br>\n          &nbsp;&nbsp;<span class=\"path-highlight\">brivia_customer=<\/span><span class=\"path-val\">&lt;cliente&gt;<\/span>/<span class=\"path-highlight\">etl_extraction_date=<\/span><span class=\"path-val\">&lt;data&gt;<\/span>/<span class=\"path-val\">&lt;arquivo&gt;<\/span>\n        <\/div>\n        <div class=\"struct-points\" style=\"gap:36px;\">\n          <div class=\"struct-point\">\n            <h4>Cada nível tem um propósito<\/h4>\n            <p>Projeto → Ambiente → Domínio → Tabela → Cliente → Data. Hierarquia que reflete o negócio, não a tecnologia.<\/p>\n          <\/div>\n          <div class=\"struct-point\">\n            <h4>Ganho prático no BigQuery<\/h4>\n            <p>Filtros rápidos por cliente e data. Menos bytes lidos, menos custo. O particionamento direciona onde buscar antes de buscar.<\/p>\n          <\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/section>\n\n  <!-- ─── SLIDE 6: SILVER ─── -->\n  <section data-label=\"06 Silver — dado confiável\">\n    <div class=\"slide\" style=\"justify-content:space-between;\">\n      <img src=\"b4556244-2720-4c48-9bee-edc0bd1198da\" class=\"logo\">\n      <div style=\"padding-top:48px;\">\n        <span class=\"section-badge badge-silver\">Silver<\/span>\n        <div class=\"slide-title\" style=\"margin-bottom:0;margin-top:12px;\">Dado confiável<\/div>\n      <\/div>\n      <div class=\"silver-bullets\" style=\"gap:56px;margin-top:-24px;\">\n        <div class=\"silver-bullet\">\n          <div class=\"silver-num\">01<\/div>\n          <div class=\"silver-text\">Dentro do <strong>BigQuery<\/strong><\/div>\n        <\/div>\n        <div class=\"silver-bullet\">\n          <div class=\"silver-num\">02<\/div>\n          <div class=\"silver-text\"><strong>Granular, deduplicado, padronizado<\/strong><\/div>\n        <\/div>\n        <div class=\"silver-bullet\">\n          <div class=\"silver-num\">03<\/div>\n          <div class=\"silver-text\">Uma única representação por entidade — sem duplicatas, sem ambiguidade<\/div>\n        <\/div>\n      <\/div>\n      <div class=\"trust-callout\" style=\"margin-top:0;\">\n        Regra prática: se você vai tomar uma decisão de negócio, não use dado de Bronze diretamente. Use Silver.\n      <\/div>\n    <\/div>\n  <\/section>\n\n  <!-- ─── SLIDE 7: GOLD ─── -->\n  <section data-label=\"07 Gold — pronto para consumo\">\n    <div class=\"slide\" style=\"justify-content:space-between;\">\n      <img src=\"b4556244-2720-4c48-9bee-edc0bd1198da\" class=\"logo\">\n      <div>\n        <span class=\"section-badge badge-gold\">Gold<\/span>\n        <div class=\"slide-title\" style=\"margin-bottom:32px;margin-top:12px;\">Pronto para consumo<\/div>\n      <\/div>\n      <div class=\"gold-grid\" style=\"gap:32px;\">\n        <div class=\"gold-card\">\n          <h4>Onde fica<\/h4>\n          <p>Dentro do BigQuery<\/p>\n        <\/div>\n        <div class=\"gold-card\">\n          <h4>Estrutura<\/h4>\n          <p>Fatos, dimensões, agregações, regras de negócio<\/p>\n        <\/div>\n        <div class=\"gold-card\">\n          <h4>Consumidores<\/h4>\n          <p>Power BI · Looker · Planilhas · Exportações · Agentes de IA<\/p>\n        <\/div>\n        <div class=\"gold-card wide\">\n          <h4>Propósito<\/h4>\n          <p>Modelado para responder perguntas de negócio e ser o consumo final do dado<\/p>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/section>\n\n  <!-- ─── SLIDE 8: DBT ─── -->\n  <section data-label=\"08 DBT — o que é\">\n    <div class=\"slide\" style=\"justify-content:center; gap:40px;\">\n      <img src=\"b4556244-2720-4c48-9bee-edc0bd1198da\" class=\"logo\">\n      <div>\n        <span class=\"section-badge badge-dbt\">DBT<\/span>\n        <div class=\"slide-title\" style=\"margin-bottom:32px;margin-top:12px;\">O que é o DBT<\/div>\n      <\/div>\n      <div>\n        <div class=\"dbt-intro\" style=\"margin-bottom:48px;margin-top:0;\">\n          Organiza, versiona e rastreia transformações SQL como código de software.<br>\n          O BigQuery executa. O DBT orquestra.\n        <\/div>\n        <div class=\"dbt-items\" style=\"gap:40px;\">\n          <div class=\"dbt-item\">\n            <h4>Organização de SQL<\/h4>\n            <p>Modelos bem definidos, estruturados em camadas. Sem scripts soltos.<\/p>\n          <\/div>\n          <div class=\"dbt-item\">\n            <h4>Versionamento de código<\/h4>\n            <p>Toda transformação vive no Git. Histórico completo de mudanças.<\/p>\n          <\/div>\n          <div class=\"dbt-item\">\n            <h4>Rastreabilidade<\/h4>\n            <p>De onde cada dado veio, para onde foi. Linhagem automática.<\/p>\n          <\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/section>\n\n  <!-- ─── SLIDE 9: DBT LINEAGE ─── -->\n  <section data-label=\"09 DBT — linhagem de dados\">\n    <div class=\"slide\" style=\"justify-content:center; gap:40px;\">\n      <img src=\"b4556244-2720-4c48-9bee-edc0bd1198da\" class=\"logo\">\n      <div>\n        <span class=\"section-badge badge-dbt\">DBT<\/span>\n        <div class=\"slide-title\" style=\"margin-bottom:8px;margin-top:12px;\">Linhagem de dados<\/div>\n        <div style=\"font-size:27px;color:var(--text);margin-bottom:0;\">Cada nó é um modelo SQL — as setas mostram dependência<\/div>\n      <\/div>\n\n      <!-- Lineage diagram -->\n      <div class=\"lineage-wrap\" style=\"flex:0;\">\n        <div class=\"lineage-inner\">\n          <!-- Column labels -->\n          <div class=\"lin-col-label lcl-bronze\" style=\"left:0;\">Bronze<\/div>\n          <div class=\"lin-col-label lcl-silver\" style=\"left:430px;\">Silver<\/div>\n          <div class=\"lin-col-label lcl-gold\" style=\"left:860px;\">Gold<\/div>\n          <div class=\"lin-col-label lcl-consume\" style=\"left:1290px;\">Consumo<\/div>\n\n          <!-- Bronze nodes -->\n          <div class=\"lin-node ln-bronze\" style=\"top:72px;  left:0;\">orders<\/div>\n          <div class=\"lin-node ln-bronze\" style=\"top:192px; left:0;\">customers<\/div>\n          <div class=\"lin-node ln-bronze\" style=\"top:312px; left:0;\">products<\/div>\n\n          <!-- Silver nodes -->\n          <div class=\"lin-node ln-silver\" style=\"top:132px; left:430px;\">orders<\/div>\n          <div class=\"lin-node ln-silver\" style=\"top:252px; left:430px;\">customers<\/div>\n\n          <!-- Gold nodes -->\n          <div class=\"lin-node ln-gold\" style=\"top:132px; left:860px;\">fct_orders<\/div>\n          <div class=\"lin-node ln-gold\" style=\"top:252px; left:860px;\">dim_customers<\/div>\n\n          <!-- Consume nodes -->\n          <div class=\"lin-node ln-consume\" style=\"top:132px; left:1290px;\">Power BI<\/div>\n          <div class=\"lin-node ln-consume\" style=\"top:252px; left:1290px;\">Looker<\/div>\n          <div class=\"lin-node ln-consume\" style=\"top:372px; left:1290px;\">Agentes<\/div>\n\n          <!-- SVG arrows -->\n          <!-- Node right edge for Bronze ≈ 0+200=200; Silver left=430; Silver right≈630; Gold left=860; Gold right≈1010; Consume left=1290 -->\n          <!-- Node heights 56px, centers: Bronze orders=100, customers=220, products=340; Silver orders=160, customers=280; Gold fct=160, dim=280; Consume PBI=160, Looker=280 -->\n          <svg class=\"lin-svg\" viewBox=\"0 0 1620 440\" preserveAspectRatio=\"xMidYMid meet\">\n            <defs>\n              <marker id=\"arr\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"3\" orient=\"auto\">\n                <path d=\"M0,0 L0,6 L7,3 z\" fill=\"#1d4ed8\" opacity=\"0.5\"><\/path>\n              <\/marker>\n            <\/defs>\n\n            <!-- Bronze → Silver -->\n            <!-- orders → orders (100 → 160): gentle curve -->\n            <path d=\"M 202,100 C 316,100 316,160 432,160\" stroke=\"#a0692a\" stroke-width=\"2\" fill=\"none\" opacity=\"0.5\" marker-end=\"url(#arr)\"><\/path>\n            <!-- customers → customers (220 → 280): -->\n            <path d=\"M 202,220 C 316,220 316,280 432,280\" stroke=\"#a0692a\" stroke-width=\"2\" fill=\"none\" opacity=\"0.5\" marker-end=\"url(#arr)\"><\/path>\n            <!-- products → silver orders (340 → 160): diagonal up -->\n            <path d=\"M 202,340 C 316,340 316,160 432,160\" stroke=\"#a0692a\" stroke-width=\"2\" fill=\"none\" opacity=\"0.5\" marker-end=\"url(#arr)\"><\/path>\n\n            <!-- Silver → Gold -->\n            <!-- orders → fct_orders (160 → 160): straight -->\n            <path d=\"M 580,160 C 719,160 719,160 858,160\" stroke=\"#4a6070\" stroke-width=\"2\" fill=\"none\" opacity=\"0.5\" marker-end=\"url(#arr)\"><\/path>\n            <!-- customers → fct_orders (280 → 160): diagonal up -->\n            <path d=\"M 632,280 C 746,280 746,160 858,160\" stroke=\"#4a6070\" stroke-width=\"2\" fill=\"none\" opacity=\"0.5\" marker-end=\"url(#arr)\"><\/path>\n            <!-- customers → dim_customers (280 → 280): straight -->\n            <path d=\"M 632,280 C 746,280 746,280 858,280\" stroke=\"#4a6070\" stroke-width=\"2\" fill=\"none\" opacity=\"0.5\" marker-end=\"url(#arr)\"><\/path>\n\n            <!-- Gold → Consume -->\n            <!-- fct_orders → Power BI (160 → 160) -->\n            <path d=\"M 1078,160 C 1183,160 1183,160 1288,160\" stroke=\"#8a6a00\" stroke-width=\"2\" fill=\"none\" opacity=\"0.5\" marker-end=\"url(#arr)\"><\/path>\n            <!-- dim_customers → Looker (280 → 280) -->\n            <path d=\"M 1124,280 C 1206,280 1206,280 1288,280\" stroke=\"#8a6a00\" stroke-width=\"2\" fill=\"none\" opacity=\"0.5\" marker-end=\"url(#arr)\"><\/path>\n            <!-- fct_orders → Looker (160 → 280) cross-use -->\n            <path d=\"M 1078,160 C 1183,160 1183,280 1288,280\" stroke=\"#8a6a00\" stroke-width=\"1.5\" fill=\"none\" opacity=\"0.25\" stroke-dasharray=\"6,4\" marker-end=\"url(#arr)\"><\/path>\n          <\/svg>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/section>\n\n  <!-- ─── SLIDE 10: RECAP ─── -->\n  <section data-label=\"10 Recapitulando\">\n    <div class=\"slide\" style=\"justify-content:center; gap:40px;\">\n      <img src=\"b4556244-2720-4c48-9bee-edc0bd1198da\" class=\"logo\">\n      <div style=\"flex:0;\">\n        <div class=\"slide-title\" style=\"margin-bottom:32px;\">Recapitulando<\/div>\n      <\/div>\n      <table class=\"recap-table\">\n        <thead>\n          <tr>\n            <th class=\"th-label\" style=\"width:180px;\"><\/th>\n            <th class=\"th-bronze\">Bronze<\/th>\n            <th class=\"th-silver\">Silver<\/th>\n            <th class=\"th-gold\">Gold<\/th>\n          <\/tr>\n        <\/thead>\n        <tbody>\n          <tr>\n            <td class=\"row-header\">Onde fica<\/td>\n            <td>Cloud Storage<\/td>\n            <td>BigQuery<\/td>\n            <td>BigQuery<\/td>\n          <\/tr>\n          <tr>\n            <td class=\"row-header\">Formato<\/td>\n            <td>Parquet, CSV, JSON<\/td>\n            <td>Tabelas nativas BQ<\/td>\n            <td>Tabelas nativas BQ<\/td>\n          <\/tr>\n          <tr>\n            <td class=\"row-header\">Estado<\/td>\n            <td>Bruto, sem toque<\/td>\n            <td>Limpo e confiável<\/td>\n            <td>Modelado para negócio<\/td>\n
